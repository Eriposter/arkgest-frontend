<header class="bg-white shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      

      <!-- ✅ CENTRO: Pesquisa Global -->
      <div class="flex-1 max-w-xl mx-4 hidden md:block">
        <app-global-search></app-global-search>
      </div>

      <!-- Direita: Ações -->
      <div class="flex items-center gap-2">
        
        <!-- ✅ Botão de Pesquisa Mobile -->
        <button (click)="openSearch()" 
                class="md:hidden p-2 text-white/80 hover:text-white hover:bg-white/10 rounded-lg transition-colors"
                title="Pesquisar">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </button>

        <!-- Botão Super Admin (visível apenas para super-admin) -->
        <a *ngIf="isSuperAdmin" 
           routerLink="/super-admin"
           class="p-2 text-yellow-300 hover:text-yellow-100 hover:bg-white/10 rounded-lg transition-colors"
           title="Painel Super Admin">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
        </a>

        <!-- Notificações -->
        <div class="relative">
          <!-- No header.component.html, atualiza o botão de notificações -->
<button (click)="toggleNotifications()" 
        class="bg-gradient-to-r from-indigo-600 to-purple-600 relative p-2 text-white/80 hover:text-white hover:bg-white/10 rounded-lg transition-colors"
        [class.animate-bounce]="hasNewNotification">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
  </svg>
  <span *ngIf="unreadCount > 0" 
        class="absolute top-1 right-1 min-w-[18px] h-[18px] px-1 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center"
        [class.animate-ping]="hasNewNotification">
    {{ unreadCount > 9 ? '9+' : unreadCount }}
  </span>
</button>

          <!-- Dropdown de Notificações -->
          <div *ngIf="showNotifications" 
               class="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-2xl border border-gray-200 overflow-hidden z-50">
            <div class="px-4 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white">
              <h3 class="font-semibold">Notificações</h3>
              <p class="text-xs text-white/80">{{ unreadCount }} novas</p>
            </div>
            
            <div class="max-h-96 overflow-y-auto">
              <div *ngIf="notifications.length === 0" class="px-4 py-8 text-center text-gray-500">
                <svg class="w-12 h-12 mx-auto text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                <p class="text-sm">Sem notificações</p>
              </div>
              
              <div *ngFor="let notification of notifications" 
                   (click)="markAsRead(notification)"
                   class="px-4 py-3 border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors"
                   [class.bg-indigo-50]="!notification.read_at">
                <div class="flex items-start gap-3">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0"
                       [ngClass]="getIconColor(notification.type)">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900">{{ notification.title }}</p>
                    <p class="text-xs text-gray-500 mt-0.5">{{ notification.message }}</p>
                    <p class="text-[10px] text-gray-400 mt-1">{{ notification.created_at }}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Separador -->
        <div class="w-px h-6 bg-white/20"></div>

        <!-- Menu do Utilizador -->
        <app-user-menu></app-user-menu>
      </div>
    </div>
  </div>
</header>
