<!-- Overlay Mobile -->
<div 
  *ngIf="isOpen"
  (click)="closeSidebar()"
  class="fixed inset-0 bg-black/50 z-20 lg:hidden"
  aria-hidden="true">
</div>

<!-- Overlay Mobile -->
<div 
  *ngIf="isOpen"
  (click)="closeSidebar()"
  class="fixed inset-0 bg-black/50 z-20 lg:hidden"
  aria-hidden="true">
</div>

<!-- Sidebar FIXO -->
<aside 
  class="fixed inset-y-0 left-0 w-64 bg-gradient-to-b from-indigo-900 to-purple-900 text-white flex flex-col transform transition-transform duration-300 ease-in-out z-30"
  [class.-translate-x-full]="!isOpen"
  [class.translate-x-0]="isOpen || true">
  
  <!-- Botão Fechar (Mobile) -->
  <button 
    (click)="closeSidebar()"
    class="lg:hidden absolute top-4 right-4 text-white/60 hover:text-white z-10"
    aria-label="Fechar menu">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
  
  <!-- Logo -->
  <div class="p-6 border-b border-white/10 flex-shrink-0">
    <a routerLink="/dashboard" (click)="closeSidebar()" class="flex items-center space-x-3">
      <div class="bg-white/10 rounded-lg p-2">
                <i class="fas fa-draw-polygon text-white text-2xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl">ArkGest</h1>
                <p class="text-xs text-white/60">Gestão de Arquitectura</p>
            </div>
    </a>
  </div>
  
  <!-- User Info -->
  <!-- <div class="p-6 border-b border-white/10 flex-shrink-0">
    <div class="flex items-center space-x-3">
      <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full flex items-center justify-center shadow-lg">
        <span class="font-bold text-lg">{{ userInitials }}</span>
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-medium text-sm truncate">{{ userName }}</p>
        <p class="text-xs text-white/60 capitalize">{{ userRole }}</p>
      </div>
    </div>
  </div> -->
  
  <!-- Navigation com scroll próprio -->
  <nav class="flex-1 overflow-y-auto py-6 px-4 scrollbar-hide">
    <div class="space-y-1">
      <!-- Itens do Menu Principal -->
      <a 
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        (click)="closeSidebar()"
        routerLinkActive="bg-white/20 shadow-lg active-item"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="flex items-center justify-between px-4 py-3 rounded-lg transition-all hover:bg-white/10 hover:translate-x-1">
        <div class="flex items-center space-x-3">
          <!-- Dashboard -->
          <svg *ngIf="item.icon === 'dashboard'" class="w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          <!-- Projetos -->
          <svg *ngIf="item.icon === 'projects'" class="w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
          </svg>
          <!-- Tarefas -->
          <svg *ngIf="item.icon === 'tasks'" class="w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
          </svg>
          <!-- Clientes -->
          <svg *ngIf="item.icon === 'clients'" class="w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          <!-- Documentos -->
          <svg *ngIf="item.icon === 'documents'" class="w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          <!-- Faturas -->
          <svg *ngIf="item.icon === 'invoices'" class="w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          <!-- Calendário -->
          <svg *ngIf="item.icon === 'calendar'" class="w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <!-- Relatórios -->
          <svg *ngIf="item.icon === 'reports'" class="w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
          <span>{{ item.name }}</span>
        </div>
        <!-- Badge -->
        <span 
          *ngIf="item.icon === 'tasks' && pendingTasks > 0"
          [class]="item.badgeColor + ' text-white text-xs px-2 py-1 rounded-full'">
          {{ formatBadge(pendingTasks) }}
        </span>
      </a>
    </div>
    <!-- Secção Super Admin -->
    <div *ngIf="superItems.length > 0">
      <p class="text-xs text-white/40 px-4 mb-2 uppercase tracking-wider">Super Admin</p>
      <div class="space-y-1">
        <a 
          *ngFor="let item of superItems"
          [routerLink]="item.route"
          (click)="closeSidebar()"
          routerLinkActive="bg-white/20 active-item"
          class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10 hover:translate-x-1 transition-all">
          <span>{{ item.name }}</span>
        </a>
      </div>
    </div>
    
    <!-- Secção Sistema -->
    <div class="mt-8 pt-6 border-t border-white/10">
      <p class="text-xs text-white/40 px-4 mb-2 uppercase tracking-wider">Sistema</p>
      <div class="space-y-1">
        <a 
          *ngFor="let item of systemItems"
          [routerLink]="item.route"
          (click)="closeSidebar()"
          routerLinkActive="bg-white/20 active-item"
          class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10 hover:translate-x-1 transition-all">
          <!-- Configurações -->
          <svg *ngIf="item.icon === 'settings'" class="w-5 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <!-- Utilizadores -->
          <svg *ngIf="item.icon === 'users'" class="w-5 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <span>{{ item.name }}</span>
        </a>
      </div>
    </div>

    <!-- Sair -->
    <div class="mt-4">
      <button 
        (click)="logout()"
        class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-red-600/20 text-red-300 hover:text-red-200 transition-all">
        <svg class="w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Sair</span>
      </button>
    </div>
  </nav>
  
  <!-- Versão -->
  <div class="p-4 border-t border-white/10 flex-shrink-0">
    <p class="text-xs text-white/40 text-center">
      Versão 1.0.0<br>
      &copy; 2026 ArkGest.
    </p>
  </div>
</aside>
