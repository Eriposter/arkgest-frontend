<div class="relative">
  <button 
    (click)="toggleMenu()"
    type="button" 
    class="-m-1.5 flex items-center p-1.5 rounded-full hover:bg-gray-100 transition-colors">
    <span class="sr-only">Abrir menu</span>
    <div class="h-8 w-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-semibold text-sm">
    {{ user?.name?.charAt(0)?.toUpperCase() || '?' }}
</div>
    <span class="hidden lg:flex lg:items-center">
      <span class="ml-4 text-sm font-semibold leading-6 text-gray-900">
        {{ user?.name }}
      </span>
      <svg class="ml-2 h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
      </svg>
    </span>
  </button>

  <div *ngIf="showMenu" class="absolute right-0 z-10 mt-2.5 w-56 origin-top-right rounded-lg bg-white py-2 shadow-lg ring-1 ring-gray-900/5">
    <div class="px-4 py-2 border-b border-gray-100">
      <p class="text-sm font-medium text-gray-900">{{ user?.name }}</p>
      <p class="text-xs text-gray-500 truncate">{{ user?.email }}</p>
    </div>
    
    <a routerLink="/perfil" (click)="showMenu = false" 
       class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
      Meu Perfil
    </a>
    <a routerLink="/configuracoes" (click)="showMenu = false" 
       class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      Configurações
    </a>
    
    <hr class="my-1">
    
    <button (click)="logout()"
      class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Sair
    </button>
  </div>
</div>
