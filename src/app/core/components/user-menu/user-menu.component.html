<div class="relative">
  <button 
    (click)="toggleMenu()"
    type="button" 
    class="-m-1.5 flex items-center p-1.5 rounded-full hover:bg-gray-100 transition-colors"
  >
    <span class="sr-only">Open user menu</span>
    <div class="h-8 w-8 rounded-full bg-gradient-to-br from-purple-400 to-purple-600 flex items-center justify-center text-white font-semibold text-sm">
      <!-- {{ user?.name}} -->
    </div>
    <span class="hidden lg:flex lg:items-center">
      <span class="ml-4 text-sm font-semibold leading-6 text-gray-900" aria-hidden="true">
        {{ user?.name }}
      </span>
      <svg class="ml-2 h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
      </svg>
    </span>
  </button>

  <!-- Dropdown Menu -->
  <div *ngIf="showMenu" class="absolute right-0 z-10 mt-2.5 w-48 origin-top-right rounded-md bg-white py-2 shadow-lg ring-1 ring-gray-900/5 focus:outline-none">
    <a href="/profile" class="block px-3 py-2 text-sm leading-6 text-gray-900 hover:bg-gray-50">
      Perfil
    </a>
    <a href="/settings" class="block px-3 py-2 text-sm leading-6 text-gray-900 hover:bg-gray-50">
      Configurações
    </a>
    <hr class="my-1">
    <button 
      (click)="logout()"
      class="w-full text-left block px-3 py-2 text-sm leading-6 text-red-600 hover:bg-gray-50"
    >
      Sair
    </button>
  </div>
</div>
