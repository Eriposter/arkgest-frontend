<div class="min-h-screen bg-gray-50 py-8">
  <div class="px-4 sm:px-6 lg:px-8">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">{{ isEditing ? 'Editar Projeto' : 'Novo Projeto' }}</h1>
        <p class="text-gray-500 mt-1">Preencha todos os dados do projeto</p>
      </div>
      <button (click)="cancel()" class="inline-flex items-center px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
        Cancelar
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <!-- Tipo de Projeto -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
          <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z" />
          </svg>
          Tipo de Projeto
        </h2>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
          <button type="button" (click)="selectType('residencial')" 
            [class.border-indigo-600]="projectType === 'residencial'" 
            [class.bg-indigo-50]="projectType === 'residencial'"
            class="p-4 border-2 border-gray-200 rounded-xl hover:border-indigo-300 hover:bg-indigo-50 transition-all text-center">
            <svg class="w-8 h-8 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="text-sm font-medium text-gray-900">Residencial</span>
          </button>
          <button type="button" (click)="selectType('comercial')" 
            [class.border-indigo-600]="projectType === 'comercial'" 
            [class.bg-indigo-50]="projectType === 'comercial'"
            class="p-4 border-2 border-gray-200 rounded-xl hover:border-indigo-300 hover:bg-indigo-50 transition-all text-center">
            <svg class="w-8 h-8 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
            <span class="text-sm font-medium text-gray-900">Comercial</span>
          </button>
          <button type="button" (click)="selectType('industrial')" 
            [class.border-indigo-600]="projectType === 'industrial'" 
            [class.bg-indigo-50]="projectType === 'industrial'"
            class="p-4 border-2 border-gray-200 rounded-xl hover:border-indigo-300 hover:bg-indigo-50 transition-all text-center">
            <svg class="w-8 h-8 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z" />
            </svg>
            <span class="text-sm font-medium text-gray-900">Industrial</span>
          </button>
          <button type="button" (click)="selectType('publico')" 
            [class.border-indigo-600]="projectType === 'publico'" 
            [class.bg-indigo-50]="projectType === 'publico'"
            class="p-4 border-2 border-gray-200 rounded-xl hover:border-indigo-300 hover:bg-indigo-50 transition-all text-center">
            <svg class="w-8 h-8 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <span class="text-sm font-medium text-gray-900">Público</span>
          </button>
          <button type="button" (click)="selectType('outro')" 
            [class.border-indigo-600]="projectType === 'outro'" 
            [class.bg-indigo-50]="projectType === 'outro'"
            class="p-4 border-2 border-gray-200 rounded-xl hover:border-indigo-300 hover:bg-indigo-50 transition-all text-center">
            <svg class="w-8 h-8 mx-auto mb-2 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z" />
            </svg>
            <span class="text-sm font-medium text-gray-900">Outro</span>
          </button>
        </div>
      </div>

      <!-- Dados Principais -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
          <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          Dados Principais
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Nome do Projeto <span class="text-red-500">*</span>
            </label>
            <input type="text" formControlName="name" 
              class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border"
              [class.border-red-500]="form.get('name')?.invalid && form.get('name')?.touched"
              placeholder="Ex: Residência Familiar - Talatona">
            <p *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="mt-1 text-sm text-red-600">
              Nome obrigatório
            </p>
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Cliente <span class="text-red-500">*</span>
            </label>
            <select formControlName="client_id" 
              class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border bg-white"
              [class.border-red-500]="form.get('client_id')?.invalid && form.get('client_id')?.touched">
              <option value="">Selecione um cliente</option>
              <option *ngFor="let client of clients" [value]="client.id">
                {{ client.name }} {{ client.company ? '(' + client.company + ')' : '' }}
              </option>
            </select>
            <p *ngIf="form.get('client_id')?.invalid && form.get('client_id')?.touched" class="mt-1 text-sm text-red-600">
              Cliente obrigatório
            </p>
          </div>
        </div>
      </div>

      <!-- Localização e Área -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
          <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Localização e Área
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Localização <span class="text-gray-400">(Opcional)</span></label>
            <input type="text" formControlName="location" 
              class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border"
              placeholder="Ex: Talatona, Luanda">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Área (m²) <span class="text-gray-400">(Opcional)</span></label>
            <input type="number" formControlName="area" min="0"
              class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border"
              placeholder="Ex: 250">
          </div>
        </div>
      </div>

      <!-- Orçamento e Datas -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
          <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          Orçamento e Datas
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Orçamento (Kz) <span class="text-gray-400">(Opcional)</span></label>
            <input type="number" formControlName="budget" min="0"
              class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border"
              placeholder="Ex: 5000000">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Data de Início <span class="text-gray-400">(Opcional)</span></label>
            <input type="date" formControlName="start_date" 
              class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Data Estimada de Término <span class="text-gray-400">(Opcional)</span></label>
            <input type="date" formControlName="estimated_end_date" 
              class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Data Real de Término <span class="text-gray-400">(Opcional)</span></label>
            <input type="date" formControlName="actual_end_date" 
              class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
          </div>
        </div>
      </div>

      <!-- Fase e Status -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
          <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
          Fase e Status
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Fase Atual <span class="text-red-500">*</span></label>
            <select formControlName="phase" 
              class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border bg-white">
              <option value="prospect">Prospecção</option>
              <option value="contratado">Contratado</option>
              <option value="projeto_arquitetonico">Projeto Arquitetónico</option>
              <option value="legalizacao">Legalização</option>
              <option value="projeto_execucao">Projeto de Execução</option>
              <option value="obra">Obra</option>
              <option value="concluido">Concluído</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Status <span class="text-red-500">*</span></label>
            <select formControlName="status" 
              class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border bg-white">
              <option value="em_andamento">Em Andamento</option>
              <option value="pausado">Pausado</option>
              <option value="concluido">Concluído</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Progresso: {{ form.get('progress')?.value }}%</label>
            <div class="flex items-center gap-3">
              <input type="range" formControlName="progress" min="0" max="100" step="5"
                class="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
              <span class="text-sm font-semibold text-gray-700 w-12 text-right">{{ form.get('progress')?.value }}%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2 mt-2">
              <div class="h-2 rounded-full transition-all duration-500" 
                   [class]="getProgressColor(form.get('progress')?.value || 0)"
                   [style.width.%]="form.get('progress')?.value || 0"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Descrição -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
          <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
          Descrição do Projeto
        </h2>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Notas e Detalhes <span class="text-gray-400">(Opcional)</span></label>
          <textarea formControlName="description" rows="4"
            class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border"
            placeholder="Descreva os detalhes do projeto, objetivos, requisitos especiais..."></textarea>
        </div>
      </div>

      <!-- Botões de Ação -->
      <div class="flex justify-end gap-3 pt-6 border-t border-gray-200">
        <button type="button" (click)="cancel()" 
          class="px-6 py-2.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
          Cancelar
        </button>
        <button type="submit" [disabled]="loading || form.invalid"
          class="px-6 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm flex items-center gap-2">
          <svg *ngIf="loading" class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          {{ loading ? 'Salvando...' : (isEditing ? 'Atualizar Projeto' : 'Criar Projeto') }}
        </button>
      </div>
    </form>
  </div>
</div>
