<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">

  <!-- Camada do fundo com blur (apenas na imagem) -->
  <div class="absolute inset-0 bg-cover bg-center"
    style="background-image: url(assets/img/back.png); filter: blur(4px); transform: scale(1.05);">
  </div>

  <!-- Overlay escuro (opcional, mantém legibilidade) -->
  <div class="absolute inset-0 bg-black/40"></div>

  <!-- Conteúdo principal (fica por cima, sem blur) -->
  <div class="relative z-10 max-w-md w-full space-y-8">

    <!-- Logo e Título -->
    <div class="text-center">
      <div class="mx-auto h-16 w-16 bg-white/10 backdrop-blur-sm rounded-2xl flex items-center justify-center">
        <i class="fas fa-draw-polygon text-black text-4xl"></i>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-white">ArkGest</h2>
      <p class="mt-2 text-sm text-white/80">Gestão de Arquitectura</p>
    </div>

    <div *ngIf="message" class="mb-4 p-4 rounded-lg border" [class.bg-amber-50]="message.type === 'warning'"
      [class.border-amber-200]="message.type === 'warning'" [class.text-amber-800]="message.type === 'warning'">
      {{ message.text }}
    </div>

    <!-- Card do Formulário -->
    <div class="bg-white/50 backdrop-blur-sm rounded-2xl shadow-2xl p-8">
      <h3 class="text-2xl font-bold text-gray-900 mb-6 text-center">Entrar na sua conta</h3>

      <!-- Mensagem de Erro -->
      <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg flex items-start gap-3">
        <svg class="w-5 h-5 text-red-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p class="text-sm text-red-800">{{ errorMessage }}</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
            Email
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
              </svg>
            </div>
            <input id="email" type="email" formControlName="email"
              class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
              [class.border-red-500]="form.get('email')?.invalid && form.get('email')?.touched"
              placeholder="seu@email.com">
          </div>
          <p *ngIf="form.get('email')?.errors?.['required'] && form.get('email')?.touched"
            class="mt-1 text-sm text-red-600">
            Email é obrigatório
          </p>
          <p *ngIf="form.get('email')?.errors?.['email'] && form.get('email')?.touched"
            class="mt-1 text-sm text-red-600">
            Email inválido
          </p>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Senha
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
              class="block w-full pl-10 pr-10 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
              [class.border-red-500]="form.get('password')?.invalid && form.get('password')?.touched"
              placeholder="••••••••">
            <button type="button" (click)="togglePasswordVisibility()"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
              <svg *ngIf="!showPassword" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg *ngIf="showPassword" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            </button>
          </div>
          <p *ngIf="form.get('password')?.errors?.['required'] && form.get('password')?.touched"
            class="mt-1 text-sm text-red-600">
            Senha é obrigatória
          </p>
          <p *ngIf="form.get('password')?.errors?.['minlength'] && form.get('password')?.touched"
            class="mt-1 text-sm text-red-600">
            Mínimo 6 caracteres
          </p>
        </div>

        <!-- Botão de Submeter -->
        <button type="submit" [disabled]="loading || form.invalid"
          class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          <svg *ngIf="loading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>

      <!-- Footer -->
      <div class="mt-6 text-center">
        <p class="text-xs text-gray-800">
          &copy; 2026 ArkGest. Todos os direitos reservados.
        </p>
      </div>
    </div>
  </div>
</div>
