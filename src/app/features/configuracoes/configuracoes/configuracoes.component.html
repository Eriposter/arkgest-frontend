<div class="min-h-screen bg-gray-50 py-8">
  <div class="px-4 sm:px-6 lg:px-8">
    
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Configurações</h1>
      <p class="text-gray-500 mt-1">Personalize o sistema e dados da empresa</p>
    </div>

    <!-- Mensagem de Sucesso -->
    <div *ngIf="message" class="mb-6 p-4 bg-emerald-50 border border-emerald-200 rounded-lg flex items-center gap-3 text-emerald-800">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="text-sm font-medium">{{ message }}</span>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      
      <!-- Tabs -->
      <div class="border-b border-gray-200 px-6">
        <nav class="flex gap-6 -mb-px">
          <button (click)="activeTab = 'empresa'"
            [class.border-indigo-500]="activeTab === 'empresa'"
            [class.text-indigo-600]="activeTab === 'empresa'"
            [class.border-transparent]="activeTab !== 'empresa'"
            [class.text-gray-500]="activeTab !== 'empresa'"
            class="py-4 px-1 border-b-2 font-medium text-sm transition-colors">
            Dados da Empresa
          </button>
          <button (click)="activeTab = 'faturacao'"
            [class.border-indigo-500]="activeTab === 'faturacao'"
            [class.text-indigo-600]="activeTab === 'faturacao'"
            [class.border-transparent]="activeTab !== 'faturacao'"
            [class.text-gray-500]="activeTab !== 'faturacao'"
            class="py-4 px-1 border-b-2 font-medium text-sm transition-colors">
            Faturação
          </button>
          <button (click)="activeTab = 'license'"
        [class.border-indigo-500]="activeTab === 'license'"
        [class.text-indigo-600]="activeTab === 'license'"
        class="px-6 py-4 text-sm font-medium border-b-2 border-transparent hover:text-gray-700">
  🔑 Licença
</button>
        </nav>
      </div>

      <!-- Tab: Dados da Empresa -->
      <div *ngIf="activeTab === 'empresa'" class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
          
          <!-- Logo -->
          <div class="flex items-center gap-6 pb-6 border-b border-gray-200">
            <div class="w-24 h-24 rounded-lg border-2 border-dashed border-gray-300 flex items-center justify-center overflow-hidden bg-gray-50">
              <img *ngIf="logoPreview" [src]="logoPreview" class="w-full h-full object-contain">
              <svg *ngIf="!logoPreview" class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Logo da Empresa</label>
              <label class="inline-flex items-center px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 cursor-pointer">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                Selecionar Logo
                <input type="file" accept="image/*" (change)="onLogoSelected($event)" class="hidden">
              </label>
              <p class="text-xs text-gray-500 mt-1">PNG, JPG até 2MB</p>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Nome da Empresa</label>
              <input type="text" formControlName="company_name" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
            </div>

            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Slogan</label>
              <input type="text" formControlName="company_slogan" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input type="email" formControlName="company_email" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Telefone</label>
              <input type="text" formControlName="company_phone" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">NIF</label>
              <input type="text" formControlName="company_nif" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
            </div>

            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Endereço</label>
              <textarea formControlName="company_address" rows="2" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border"></textarea>
            </div>
          </div>

          <div class="flex justify-end pt-4 border-t border-gray-200">
            <button type="submit" [disabled]="loading" class="px-6 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 disabled:opacity-50 transition-colors shadow-sm flex items-center gap-2">
              <svg *ngIf="loading" class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              {{ loading ? 'Salvando...' : 'Guardar Alterações' }}
            </button>
          </div>
        </form>
      </div>

      <!-- Tab: Faturação -->
      <div *ngIf="activeTab === 'faturacao'" class="p-6">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6 flex gap-3">
            <svg class="w-5 h-5 text-blue-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-sm text-blue-800">Estas configurações serão usadas automaticamente na geração de novas faturas.</p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Moeda</label>
              <select formControlName="currency" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border bg-white">
                <option value="AOA">Kwanza (AOA)</option>
                <option value="USD">Dólar (USD)</option>
                <option value="EUR">Euro (EUR)</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Prefixo da Fatura</label>
              <input type="text" formControlName="invoice_prefix" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border" placeholder="Ex: FAT">
              <p class="text-xs text-gray-500 mt-1">Ex: FAT-2026-001</p>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Prazo Padrão (dias)</label>
              <input type="number" formControlName="invoice_due_days" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 px-4 py-2 border">
            </div>
          </div>

          <div class="flex justify-end pt-4 border-t border-gray-200">
            <button type="submit" [disabled]="loading" class="px-6 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 disabled:opacity-50 transition-colors shadow-sm flex items-center gap-2">
              <svg *ngIf="loading" class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              {{ loading ? 'Salvando...' : 'Guardar Alterações' }}
            </button>
          </div>
        </form>
      </div>
      <div *ngIf="activeTab === 'license'" class="p-6">
  <app-license-info></app-license-info>
</div>
    </div>
  </div>
</div>
