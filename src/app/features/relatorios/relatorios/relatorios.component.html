<div class="min-h-screen bg-gray-50 py-8">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Relatórios</h1>
      <p class="text-gray-500 mt-1">Estatísticas e análises do seu negócio</p>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="flex justify-center items-center py-20">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
      <p class="ml-3 text-gray-500">Carregando relatórios...</p>
    </div>

    <div *ngIf="!loading" class="space-y-6">
      
      <!-- Faturamento Mensal -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
          <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
          </svg>
          Faturamento Mensal (Últimos 6 Meses)
        </h2>
        <div class="h-80">
          <canvas baseChart
            [data]="monthlyRevenueData"
            [options]="monthlyRevenueOptions"
            type="line">
          </canvas>
        </div>
      </div>

      <!-- Grid de Gráficos -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        
        <!-- Projetos por Fase -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
          <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
            <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z" />
            </svg>
            Projetos por Fase
          </h2>
          <div class="h-64">
            <canvas baseChart
              [data]="projectsByPhaseData"
              [options]="projectsByPhaseOptions"
              type="doughnut">
            </canvas>
          </div>
        </div>

        <!-- Projetos por Tipo -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
          <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
            <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
            Projetos por Tipo
          </h2>
          <div class="h-64">
            <canvas baseChart
              [data]="projectsByTypeData"
              [options]="projectsByTypeOptions"
              type="bar">
            </canvas>
          </div>
        </div>

        <!-- Tarefas por Status -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
          <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
            <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
            Tarefas por Status
          </h2>
          <div class="h-64">
            <canvas baseChart
              [data]="tasksByStatusData"
              [options]="tasksByStatusOptions"
              type="doughnut">
            </canvas>
          </div>
        </div>

        <!-- Tarefas por Prioridade -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
          <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
            <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            Tarefas por Prioridade
          </h2>
          <div class="h-64">
            <canvas baseChart
              [data]="tasksByPriorityData"
              [options]="tasksByPriorityOptions"
              type="bar">
            </canvas>
          </div>
        </div>
      </div>

      <!-- Top Clientes -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
          <svg class="w-5 h-5 text-indigo-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          Top 5 Clientes (por Faturamento)
        </h2>
        <div class="h-64">
          <canvas baseChart
            [data]="topClientsData"
            [options]="topClientsOptions"
            type="bar">
          </canvas>
        </div>
      </div>

      <!-- Resumo em Cards -->
      <!-- <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl shadow-lg p-6 text-white">

        </div>
      </div> -->
    </div>
  </div>
</div>
